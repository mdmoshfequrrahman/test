<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
    body { background-color: #121212; color: #e0e0e0; padding: 20px; }
    .container { width: 100%; margin: 0 auto; }
    
    /* Profile Header */
    header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid #2d2d2d; }
    .profile-card { display: flex; align-items: center; gap: 15px; background: #1e1e1e; padding: 10px 20px; border-radius: 50px; border: 1px solid #2d2d2d; }
    .profile-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; }
    .profile-info { display: flex; flex-direction: column; }
    .profile-name { font-weight: bold; color: #fff; }
    .profile-role { font-size: 0.8rem; color: #00E676; text-transform: uppercase; }

    /* Nav & Tabs */
    .nav-tabs { display: flex; gap: 15px; margin-top: 20px; }
    .tab-btn { background: #1e1e1e; color: #a0a0a0; border: 1px solid #2d2d2d; padding: 10px 20px; cursor: pointer; border-radius: 4px; display: none; /* Hidden by default */ }
    .tab-btn.active { background: #00E676; color: #121212; font-weight: bold; }
    
    /* Layouts */
    .view-section { display: none; margin-top: 25px; }
    .view-section.active { display: block; }
    .card { background: #1e1e1e; border: 1px solid #2d2d2d; padding: 20px; border-radius: 6px; }
    
    /* Form Elements */
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #a0a0a0; font-size: 0.9rem; }
    select, input { width: 100%; padding: 12px; background: #2d2d2d; border: 1px solid #3d3d3d; color: #fff; border-radius: 4px; font-size: 1rem; }
    button.submit-btn { width: 100%; background: #00E676; color: #121212; padding: 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 1.1rem; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>

  <div class="container">
    <header>
      <h2>AKIJ LIGHT ENGINEERING</h2>
      <div class="profile-card">
        <img id="user-avatar" class="profile-img" src="" alt="Profile">
        <div class="profile-info">
          <span id="user-name" class="profile-name">Loading...</span>
          <span id="user-role" class="profile-role">...</span>
        </div>
      </div>
    </header>

    <div class="nav-tabs">
      <button class="tab-btn" id="nav-dashboard" onclick="switchView('view-dashboard', this)">Live Dashboard</button>
      <button class="tab-btn" id="nav-data-entry" onclick="switchView('view-data-entry', this)">Data Entry</button>
      <button class="tab-btn" id="nav-admin" onclick="switchView('view-admin', this)">Admin Config</button>
    </div>

    <div id="view-data-entry" class="view-section card">
      <h3 style="margin-bottom: 20px;">Hourly Production Entry</h3>
      <div class="form-group">
        <label>Select Production Line</label>
        <select id="input-line"></select>
      </div>
      <div class="form-group">
        <label>Select Product Model</label>
        <select id="input-product"></select>
      </div>
      <div class="form-group">
        <label>Select Time Slot</label>
        <select id="input-hour">
          <option value="08:00 - 09:00">08:00 - 09:00</option>
          <option value="09:00 - 10:00">09:00 - 10:00</option>
          <option value="10:00 - 11:00">10:00 - 11:00</option>
          <option value="11:00 - 12:00">11:00 - 12:00</option>
        </select>
      </div>
      <div class="form-group">
        <label>Actual Good Parts Produced</label>
        <input type="number" id="input-output" placeholder="e.g., 480">
      </div>
      <button class="submit-btn" onclick="submitData()">Submit Hourly Data</button>
      <div id="entry-status" style="margin-top: 15px; color: #00E676; text-align: center;"></div>
    </div>

    <div id="view-dashboard" class="view-section">
      <div class="card" style="text-align: center; color: #a0a0a0;">
        <h2>Dashboard Interface Loads Here</h2>
        <p>This space will contain the symmetrical widgets mapping out line productivity.</p>
      </div>
    </div>

    <div id="view-admin" class="view-section card">
      <h2>Admin Configuration Panel</h2>
      <p style="color: #a0a0a0; margin-top: 10px;">User roles, line mapping, and target configuration UI goes here.</p>
    </div>

  </div>

  <script>
    window.onload = function() {
      google.script.run.withSuccessHandler(initializeApp).getUserState();
    };

    function initializeApp(appState) {
      var user = appState.user;
      
      // 1. Populate Profile Header
      document.getElementById('user-name').innerText = user.name;
      document.getElementById('user-role').innerText = user.role;
      document.getElementById('user-avatar').src = user.photo;
      
      // 2. Role-Based UI Routing
      // By default, buttons are hidden. We display them based on roles.
      var navDash = document.getElementById('nav-dashboard');
      var navEntry = document.getElementById('nav-data-entry');
      var navAdmin = document.getElementById('nav-admin');

      if (user.role === "Super Admin" || user.role === "Admin") {
        navDash.style.display = "block";
        navEntry.style.display = "block";
        navAdmin.style.display = "block";
        switchView('view-admin', navAdmin); // Admins land on Admin panel
      } 
      else if (user.role === "Data Entry") {
        navEntry.style.display = "block";
        // Optionally allow supervisors to see the dashboard for their lines
        navDash.style.display = "block"; 
        switchView('view-data-entry', navEntry); // Supervisors land on data entry
      } 
      else { // Viewer
        navDash.style.display = "block";
        switchView('view-dashboard', navDash); // Viewers land on dashboard
      }

      // 3. Populate Data Entry Dropdowns securely based on permissions
      populateDropdowns(appState);
    }

    function populateDropdowns(appState) {
      // Logic to parse appState.linesConfig and appState.productsConfig
      // and append <option> tags to document.getElementById('input-line') 
      // ensuring we only show lines the user is authorized for based on appState.user.lines
    }

    function switchView(viewId, btnElement) {
      document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      
      document.getElementById(viewId).classList.add('active');
      btnElement.classList.add('active');
    }

    function submitData() {
      var line = document.getElementById('input-line').value;
      var product = document.getElementById('input-product').value;
      var hour = document.getElementById('input-hour').value;
      var output = document.getElementById('input-output').value;

      if(!output) { alert("Please enter production numbers"); return; }
      
      document.getElementById('entry-status').innerText = "Saving to database...";
      
      google.script.run
        .withSuccessHandler(function(res) {
           document.getElementById('entry-status').innerText = res;
           document.getElementById('input-output').value = ''; // Reset input
        })
        .withFailureHandler(function(err) {
           document.getElementById('entry-status').style.color = "#FF1744";
           document.getElementById('entry-status').innerText = err.message;
        })
        .submitProductionData(line, product, hour, output);
    }
  </script>
</body>
</html>
