<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud Notes</title>
    <!-- Tailwind CSS for Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* Custom scrollbar for a polished look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        .toast-enter { animation: slideIn 0.3s ease-out forwards; }
        .toast-exit { animation: slideOut 0.3s ease-in forwards; }
        
        @keyframes slideIn {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        @keyframes slideOut {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(100%); opacity: 0; }
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-white shadow-sm sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-2 text-indigo-600">
                <i data-lucide="cloud-lightning" class="w-6 h-6"></i>
                <h1 class="text-xl font-bold tracking-tight">Cloud Notes</h1>
            </div>
            
            <!-- Login/User Controls -->
            <div id="auth-controls">
                <button id="login-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-full font-medium transition-colors flex items-center gap-2 text-sm shadow-sm">
                    <i data-lucide="log-in" class="w-4 h-4"></i>
                    Sign in with Google
                </button>
                <div id="user-menu" class="hidden flex items-center gap-4">
                    <span id="sync-status" class="text-xs text-gray-500 flex items-center gap-1">
                        <i data-lucide="check-circle-2" class="w-3 h-3 text-green-500"></i> Synced
                    </span>
                    <button id="logout-btn" class="text-gray-500 hover:text-red-500 p-2 rounded-full hover:bg-gray-100 transition-colors" title="Sign Out">
                        <i data-lucide="log-out" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-5xl mx-auto w-full px-4 py-8">
        
        <!-- Welcome / Login Prompt Screen -->
        <div id="welcome-screen" class="flex flex-col items-center justify-center py-20 text-center">
            <div class="bg-indigo-100 p-4 rounded-full mb-6">
                <i data-lucide="cloud" class="w-12 h-12 text-indigo-600"></i>
            </div>
            <h2 class="text-2xl font-bold mb-2">Your Notes, Everywhere.</h2>
            <p class="text-gray-500 max-w-md mx-auto mb-8">Sign in with your Google Account to securely sync your notes across all your devices using your private Google Drive.</p>
        </div>

        <!-- App UI (Hidden until logged in) -->
        <div id="app-ui" class="hidden flex flex-col gap-8">
            
            <!-- Note Input Area -->
            <div class="bg-white p-4 rounded-2xl shadow-sm border border-gray-100 relative focus-within:ring-2 focus-within:ring-indigo-500 transition-all">
                <textarea id="note-input" rows="3" placeholder="Take a note..." class="w-full resize-none outline-none text-gray-700 bg-transparent placeholder-gray-400 text-lg"></textarea>
                <div class="flex justify-between items-center mt-2">
                    <span class="text-xs text-gray-400" id="char-count">0 chars</span>
                    <button id="add-note-btn" class="bg-indigo-600 hover:bg-indigo-700 text-white px-5 py-2 rounded-full font-medium transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
                        Save Note
                    </button>
                </div>
            </div>

            <!-- Loading Skeleton -->
            <div id="loading-indicator" class="hidden grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4">
                <div class="bg-white h-32 rounded-2xl animate-pulse"></div>
                <div class="bg-white h-32 rounded-2xl animate-pulse"></div>
                <div class="bg-white h-32 rounded-2xl animate-pulse"></div>
            </div>

            <!-- Notes Grid -->
            <div id="notes-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4 auto-rows-max">
                <!-- Notes will be injected here -->
            </div>
            
            <!-- Empty State -->
            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-12 text-gray-400">
                <i data-lucide="book-open" class="w-12 h-12 mb-3 opacity-50"></i>
                <p>No notes yet. Create your first one above!</p>
            </div>
        </div>
    </main>

    <!-- Toast Notification System -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col gap-2"></div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // --- Configuration ---
        const CLIENT_ID = '850598567251-in7nucq5j002cv7ocksqu5me58vp4b75.apps.googleusercontent.com';
        const SCOPES = 'https://www.googleapis.com/auth/drive.appdata';
        
        // --- State ---
        let accessToken = null;
        let tokenClient = null;
        let notesArray = [];
        let driveFileId = null; // ID of notes.json in Drive
        let syncTimeout = null;

        // --- DOM Elements ---
        const loginBtn = document.getElementById('login-btn');
        const logoutBtn = document.getElementById('logout-btn');
        const userMenu = document.getElementById('user-menu');
        const welcomeScreen = document.getElementById('welcome-screen');
        const appUi = document.getElementById('app-ui');
        const noteInput = document.getElementById('note-input');
        const addNoteBtn = document.getElementById('add-note-btn');
        const notesGrid = document.getElementById('notes-grid');
        const emptyState = document.getElementById('empty-state');
        const loadingIndicator = document.getElementById('loading-indicator');
        const syncStatus = document.getElementById('sync-status');
        const charCount = document.getElementById('char-count');

        // --- Initialization ---
        window.onload = function() {
            // Initialize Google Identity Services
            tokenClient = google.accounts.oauth2.initTokenClient({
                client_id: CLIENT_ID,
                scope: SCOPES,
                callback: handleCredentialResponse
            });

            // Try to restore session silently if token exists in sessionStorage
            const savedToken = sessionStorage.getItem('gdrive_token');
            if (savedToken) {
                accessToken = savedToken;
                showAppUI();
                fetchNotesFromDrive();
            }
        };

        // --- Authentication ---
        loginBtn.addEventListener('click', () => {
            tokenClient.requestAccessToken({ prompt: 'consent' });
        });

        logoutBtn.addEventListener('click', () => {
            if (accessToken) {
                google.accounts.oauth2.revoke(accessToken, () => {
                    console.log('Access token revoked');
                });
            }
            sessionStorage.removeItem('gdrive_token');
            accessToken = null;
            notesArray = [];
            driveFileId = null;
            hideAppUI();
            showToast('Logged out successfully', 'success');
        });

        function handleCredentialResponse(response) {
            if (response.access_token) {
                accessToken = response.access_token;
                sessionStorage.setItem('gdrive_token', accessToken);
                showAppUI();
                fetchNotesFromDrive();
                showToast('Successfully logged in', 'success');
            }
        }

        // --- UI Flow ---
        function showAppUI() {
            loginBtn.classList.add('hidden');
            welcomeScreen.classList.add('hidden');
            userMenu.classList.remove('hidden');
            appUi.classList.remove('hidden');
        }

        function hideAppUI() {
            loginBtn.classList.remove('hidden');
            welcomeScreen.classList.remove('hidden');
            userMenu.classList.add('hidden');
            appUi.classList.add('hidden');
        }

        function updateSyncStatus(status) {
            if (status === 'syncing') {
                syncStatus.innerHTML = `<i data-lucide="refresh-cw" class="w-3 h-3 text-blue-500 animate-spin"></i> Syncing...`;
            } else if (status === 'synced') {
                syncStatus.innerHTML = `<i data-lucide="check-circle-2" class="w-3 h-3 text-green-500"></i> Synced`;
            } else if (status === 'error') {
                syncStatus.innerHTML = `<i data-lucide="alert-circle" class="w-3 h-3 text-red-500"></i> Sync Error`;
            }
            lucide.createIcons();
        }

        // --- Drive API Interactions (Using native fetch) ---
        
        async function fetchNotesFromDrive() {
            loadingIndicator.classList.remove('hidden');
            notesGrid.innerHTML = '';
            emptyState.classList.add('hidden');
            updateSyncStatus('syncing');

            try {
                // 1. Search for notes.json in appDataFolder
                const searchRes = await fetch(`https://www.googleapis.com/drive/v3/files?spaces=appDataFolder&q=name='notes.json'`, {
                    headers: { 'Authorization': `Bearer ${accessToken}` }
                });
                
                if (searchRes.status === 401) {
                    throw new Error("Token expired");
                }
                
                const searchData = await searchRes.json();

                if (searchData.files && searchData.files.length > 0) {
                    driveFileId = searchData.files[0].id;
                    
                    // 2. Download the file content
                    const fileRes = await fetch(`https://www.googleapis.com/drive/v3/files/${driveFileId}?alt=media`, {
                        headers: { 'Authorization': `Bearer ${accessToken}` }
                    });
                    
                    const textContent = await fileRes.text();
                    try {
                        notesArray = textContent ? JSON.parse(textContent) : [];
                    } catch(e) {
                        notesArray = []; // Handle corrupted JSON gracefully
                    }
                } else {
                    // File doesn't exist yet
                    notesArray = [];
                    driveFileId = null;
                }
                
                renderNotes();
                updateSyncStatus('synced');

            } catch (error) {
                console.error("Fetch Error:", error);
                if (error.message === "Token expired") {
                    logoutBtn.click();
                    showToast('Session expired. Please log in again.', 'error');
                } else {
                    updateSyncStatus('error');
                    showToast('Failed to load notes from Drive.', 'error');
                }
            } finally {
                loadingIndicator.classList.add('hidden');
            }
        }

        async function saveNotesToDrive() {
            updateSyncStatus('syncing');

            const boundary = '-------314159265358979323846';
            const delimiter = "\r\n--" + boundary + "\r\n";
            const close_delim = "\r\n--" + boundary + "--";

            const metadata = {
                name: 'notes.json',
                parents: ['appDataFolder']
            };

            const multipartRequestBody =
                delimiter +
                'Content-Type: application/json\r\n\r\n' +
                JSON.stringify(metadata) +
                delimiter +
                'Content-Type: application/json\r\n\r\n' +
                JSON.stringify(notesArray) +
                close_delim;

            const method = driveFileId ? 'PATCH' : 'POST';
            const url = driveFileId 
                ? `https://www.googleapis.com/upload/drive/v3/files/${driveFileId}?uploadType=multipart`
                : `https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart`;

            try {
                const res = await fetch(url, {
                    method: method,
                    headers: {
                        'Authorization': `Bearer ${accessToken}`,
                        'Content-Type': `multipart/related; boundary=${boundary}`
                    },
                    body: multipartRequestBody
                });

                if (!res.ok) throw new Error('Upload failed');

                const data = await res.json();
                if (!driveFileId && data.id) {
                    driveFileId = data.id; // Save new file ID for future updates
                }
                updateSyncStatus('synced');
            } catch (error) {
                console.error('Save Error:', error);
                updateSyncStatus('error');
                showToast('Failed to save to Drive', 'error');
            }
        }

        // --- Note Management ---
        
        function debounceSave() {
            clearTimeout(syncTimeout);
            updateSyncStatus('syncing');
            // Wait 1 second after last interaction before uploading to avoid API spam
            syncTimeout = setTimeout(() => {
                saveNotesToDrive();
            }, 1000);
        }

        noteInput.addEventListener('input', () => {
            charCount.textContent = `${noteInput.value.length} chars`;
            addNoteBtn.disabled = noteInput.value.trim().length === 0;
        });

        addNoteBtn.addEventListener('click', () => {
            const text = noteInput.value.trim();
            if (!text) return;

            const newNote = {
                id: crypto.randomUUID(),
                text: text,
                timestamp: Date.now()
            };

            notesArray.unshift(newNote); // Add to beginning
            noteInput.value = '';
            noteInput.dispatchEvent(new Event('input')); // reset counter/button
            
            renderNotes();
            debounceSave();
        });

        function deleteNote(id) {
            notesArray = notesArray.filter(note => note.id !== id);
            renderNotes();
            debounceSave();
        }

        function renderNotes() {
            notesGrid.innerHTML = '';
            
            if (notesArray.length === 0) {
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');

            notesArray.forEach(note => {
                const date = new Date(note.timestamp);
                const formattedDate = date.toLocaleDateString(undefined, { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
                
                const noteEl = document.createElement('div');
                noteEl.className = 'bg-white p-5 rounded-2xl shadow-sm border border-gray-100 hover:shadow-md transition-shadow relative group flex flex-col justify-between';
                
                // Format text: escape HTML and replace newlines with <br>
                const safeText = note.text.replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\n/g, "<br>");

                noteEl.innerHTML = `
                    <div class="text-gray-800 text-[15px] leading-relaxed mb-4 whitespace-pre-wrap break-words">${safeText}</div>
                    <div class="flex justify-between items-center mt-auto pt-3 border-t border-gray-50">
                        <span class="text-xs text-gray-400 font-medium">${formattedDate}</span>
                        <button onclick="deleteNote('${note.id}')" class="text-gray-400 hover:text-red-500 transition-colors p-1 opacity-0 group-hover:opacity-100 focus:opacity-100 rounded" aria-label="Delete note">
                            <i data-lucide="trash-2" class="w-4 h-4"></i>
                        </button>
                    </div>
                `;
                notesGrid.appendChild(noteEl);
            });
            lucide.createIcons();
        }

        // --- Custom UI Toast Notifications ---
        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            const bgColor = type === 'error' ? 'bg-red-500' : type === 'success' ? 'bg-green-500' : 'bg-gray-800';
            
            toast.className = `${bgColor} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 text-sm font-medium toast-enter max-w-xs`;
            
            const icon = type === 'error' ? 'alert-circle' : type === 'success' ? 'check-circle' : 'info';
            toast.innerHTML = `<i data-lucide="${icon}" class="w-4 h-4"></i> ${message}`;
            
            document.getElementById('toast-container').appendChild(toast);
            lucide.createIcons();

            setTimeout(() => {
                toast.classList.replace('toast-enter', 'toast-exit');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Initialize button state
        noteInput.dispatchEvent(new Event('input'));
    </script>
</body>
</html>
